server {
    listen 80;
    root /var/www/html;
    index index.php;

    # Increase buffer size for device data pushes
    client_max_body_size 10M;

    # ADMS: attendance data push  (/iclock/cdata)
    location = /iclock/cdata {
        fastcgi_pass php:9000;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/iclock/cdata.php;
        fastcgi_param QUERY_STRING    $query_string;
        fastcgi_read_timeout 60;
    }

    # ADMS: command polling  (/iclock/getrequest)
    location = /iclock/getrequest {
        fastcgi_pass php:9000;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/iclock/getrequest.php;
        fastcgi_param QUERY_STRING    $query_string;
    }

    # ADMS: command acknowledgement  (/iclock/devicecmd)
    location = /iclock/devicecmd {
        fastcgi_pass php:9000;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/iclock/devicecmd.php;
        fastcgi_param QUERY_STRING    $query_string;
    }

    # Dashboard and everything else
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # Block access to config directory
    location ~ ^/config/ {
        deny all;
        return 404;
    }
}
