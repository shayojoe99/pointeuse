services:
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "${MIDDLEWARE_PORT:-8012}:80"   # kept for ZKTeco device (LAN access)
    volumes:
      - ./nginx:/etc/nginx/conf.d:ro
      - ./src:/var/www/html:ro
    depends_on:
      - php
    networks:
      - dokploy-network
      - internal
    labels:
      - "traefik.enable=true"
      # Route attendance.cclser.com → this container
      - "traefik.http.routers.pointeuse.rule=Host(`attendance.cclser.com`)"
      - "traefik.http.routers.pointeuse.entrypoints=websecure"
      - "traefik.http.routers.pointeuse.tls.certresolver=letsencrypt"
      - "traefik.http.services.pointeuse.loadbalancer.server.port=80"
      - "traefik.docker.network=dokploy-network"

  php:
    build: ./php
    restart: unless-stopped
    volumes:
      - ./src:/var/www/html:ro
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME:-zkteco}
      DB_USER: ${DB_USER:-zkteco}
      DB_PASS: ${DB_PASS:-zkteco_pass}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS:-change_this_root_pass}
      MYSQL_DATABASE: ${DB_NAME:-zkteco}
      MYSQL_USER: ${DB_USER:-zkteco}
      MYSQL_PASSWORD: ${DB_PASS:-zkteco_pass}
    volumes:
      - db_data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASS:-change_this_root_pass}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - internal

volumes:
  db_data:

networks:
  dokploy-network:
    external: true   # Dokploy's Traefik network — already exists on the server
  internal:
    driver: bridge   # private network for php ↔ db (not exposed to Traefik)
