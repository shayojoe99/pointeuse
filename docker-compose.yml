services:
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "${MIDDLEWARE_PORT:-8012}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./src:/var/www/html:ro
    depends_on:
      - php
    networks:
      web:
        aliases:
          - zkteco-nginx
      internal: {}

  php:
    build: ./php
    restart: unless-stopped
    volumes:
      - ./src:/var/www/html:ro
    environment:
      DB_HOST: database-pointeuse-z1yen8
      DB_NAME: zkteco
      DB_USER: zkteco
      DB_PASS: ShayoJoe@1999
    networks:
      - internal
      - dokploy-network

networks:
  web:
    external: true
    name: cclser-platform_web
  internal:
    driver: bridge
  dokploy-network:
    external: true
    name: dokploy-network
